body:
  text: 四明鄞東沙門寬量源海集境緣順逆妄中邪見地分明認本家洞徹春風先及第佛前受職記名華蘊素精神心最靈宛然有佛寂惺惺惺惺寂寂常光照寂寂惺惺淨土寧羣生瘦死入囚牢立志挺身效昔豪滯相著空皆過害叮嚀反覆勸同袍念佛一心頓教門無邊經義攝歸元而今印合西飛日先謝娑婆世所尊單方一味勝名醫功效超羣宛若仙定數分明相續念彌陀是有救生船彌陀流出自心田修道還須修德全空有果然無妨閡去來何用救生船梅花帶雪笑吟歌莫絆娑婆五濁窠慈父彌陀原自性頻將四字憶心窩萬彚雖分一念刪蓮宗微妙即元關洪名念到無心處三界橫超去復還七日執持心不亂善根福德出乾坤該羅四教行人妙惟在當人一口吞魔佛境中莫妄謂禪宗淨土兩相推參禪原不立生佛淨土圓成佛定來一句頂來一句隨一聲連續一聲追分明直指原無二除却彌陀更有誰生入無生生淨土易行獨妙讚功多但教一心能憶念孩童呼母出娑婆一念圓彰四土嚴無生國裏記名籤厭欣捨取原無礙佛語當機妙獨占信願行三如鼎足往生標準正因緣吾非獅兒從空透真實方歸極樂天十方諸佛讚無窮東土始宗謝遠公蓮漏東林傳往事而今希望舊家風具縛凡夫業障多全憑四字轉心窩慈悲慧日能除暗得失居然在剎那吼石鞭尸上古傳自心懵憧入傍偏迷人不識邪魔惑佛孔衰殘世運遷單提六字具三門善導遺風千古存專雜兩途須仔細打成一片見慈尊名字僧家不是僧經論教理學何曾因循叨餮為能事老死臨頭受戰兢尸羅嚴淨自操持證入菩提戒為基受者固多依者少犯人地獄墮無疑從來淫泆罪如山失却人身萬劫難穢語邪言須切戒一生清淨自心安人間善事孝為先割愛辭親最可憐罔極深恩還未報椿萱共渡救生船佛與衆生同體性莫言食肉養精神夭亡多病前因報戒殺放生習至仁死生老病豈能期十二因緣緣起時早辦臨行歸去計淨身口意植根基博學高間與俗違一心正念有神威嚴身進道伽陀藥依此修成彈指歸福慧原來宜兼修祇須但向靜中求慈心利物仁為本結果還歸樂土遊思專想寂發心華一句當機達本家七種勝因推念力而今救取老丹霞彌陀願力妙無窮歸命之人入化工遊子還家重檢點華開黃白與青紅願生彼國志堅強念極而空達故鄉動念即時生淨土水清月現見心王應知龍樹論三觀選優陀那樂可嘉從此我心歸著處他年報滿育蓮華此方濁世苦娑婆彼土蓮快樂多偏指境緣為較量升沈美惡莫蹉跎念佛正信志不忘羣經顯示放慈光往生事迹如沙數歷歷分明載典章五濁亂時喚奈何釋迦説法振昏波而今達本還鄉去親見慈悲我佛陀淨土原來權實收擬談權設昧珠淵彌陀不異遮那體萬里無雲月正圓就路還家盜殺盜妄中念念顯真如求生不乖無生法生法全歸心卷舒壽量光明無等倫圓融中道便相親何須更覓安心法事理同收念佛人不染塵勞志出羣真機非友豈能聞癡空妄説離名字名字先鋒掃萬軍高聲念佛妙如何無念之言歧路多瓦礫真珠圓一悟秋天明月照山河疑情掃盡絶三疑裂破四關堅自持未到命終先備死有緣輔道念相資八功德水注華間到此令人惑業刪億劫輪回生死脫感應佛力有相關悟後方知正好修列宗諸老語全周圓人信口彌陀唱扭轉溈山水牯牛聞道西方樂益多舌輪微妙轉彌陀念多念少須相契字字分明仔細磨一句彌陀信口呼一輪明月映西湖而今一著通消息拍手高歌稱丈夫土淨方知生死空了明心地獲圓通質直中間無委曲雙忘淨穢顯雙融淨土易生理現成往生終不乖無生度生證入無生忍究究無生八地行古人痛䇿有三方刻骨鏤肌誓不忘百鍊千椎成鐵漢堂堂得志駕慈航人人正好念彌陀親切無如自琢磨磨得本心如朗月靈光托質藕華窩經文無字袈裟白瀝血剖心願不捐回向菩提生淨土大家齊上救生船
