front:
  text: 序自世尊憫念羣生隨機施化於一切法中求其至直捷至圓頓者莫如念佛求生淨土乃為長老舍利弗説西方有世界名極樂有佛號阿彌陀因詳述其中種種依正莊嚴勸誘衆生發願往生彼土由是淨土之説興焉晉太元時高僧慧遠結社廬山與慧永慧持等一十八人同修淨土之業而劉遺民為著發願文王喬之等復為念佛三昧詩自是淨土之學與禪宗並重信從益衆然諸賢念佛三昧詩至今尚有流傳余嘗讀其一二不過云至哉之念主心西極而於佛説淨土法門未能明白指示也四明有沙門梵琦著懷淨土詩七十七首其中有云釋迦設教在娑婆無奈衆生濁惡何欲向涅槃開祕藏須從淨土指彌陀庶幾指破迷津高登覺岸矣然其詩亦惟是泛言大意切指工夫乃今讀淡雲上人淨土救生船自為詩而自為注詩凡四十八篇每篇七言四句而每篇之注多或數千字少亦數百字發明三觀圓修之義提唱事理一心之旨推而至於執佛從心現不信西方有佛執佛西來不信自心顯現二端皆為邪見正顯事理圓通可謂深切著明至詳至盡而其歸本在信願行三門使人知所入手又諄諄於持戒之得犯戒之失勸孝戒淫尤為切摯循此以求淨域真可以一葦杭之矣余本鈍根於西來大義一無所得惟嘗注金剛經二卷闡發即住即降伏之旨頗與他解有殊上人見而善之以是詩索序敬為誦晉支道林詩云維謂冥津遐一悟可以航願與一切衆生沈淪五濁者同登此大願船也光緒二十有二年太歲在柔兆涒灘夏六月德清曲園居士俞樾撰小敘不肖愚下凡夫僧寬量字源海號淡雲又號西舵四明鄞縣應氏子賦性懶戇幼棄詩書及長矯惡塵俗不與世緣和合惟慕清涼歡喜跏趺默坐邂逅有道之僧伽咨詢無為之妙法年滿二十決志祝髮染衣入空門而皈依佛海受具於太白山天童名藍皆繇宿樹正因方能感斯勝報自慶有幸願我世世生生博通儒典而出家為僧了悟心宗而宏宣正法咸令見者聞者皆大歡喜信受奉行華嚴云若令衆生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺南海佛頂山分宗蛟川慧寂道場我先師覺照和尚在昔之時而嘗拈云淨業正因逮將沉沒皆是懷寶迷背真向偽從其事者紛如牛毛具正見者鮮若麟角致令上慢之徒輕忽吾佛之道悲夫去古時遙法久成斃正道湮微邪法增熾人多錯解蹉入邪途不思淨土一門乃出輪回之捷徑其直如弦其朗如日奧旨在於經論之間不遇明眼啓迪猶若羣盲摸象各説異端從冥入冥永纏邪見可痛惜哉其時也量志慕宗乘信而猶豫再造天童頂禮於廣昱和尚前請益楞嚴七處徵心而和尚施以當頭一棒量惘然更施慈悲反覆開示然其語雖反覆義不雷重憫我恩深誨我無倦嗣後和尚退院隱迹東湖青山寺執侍左右始獲見地乃往諸方參究拈念佛是誰參之既久未能達無生之體祇坐得清間香定中但覺輕安而已一日携鉢來杭至玉泉與精覺上人同居茅茨嘗閲淨土經論自今觀古彼則巨賢至聖咸舒藻以為盟此則覺德鴻儒盡摛毫而作誓自茲回向綿續倡和相尋誠道德之通衢常樂之直濟也是以恪遵師命惟念六字真言別無餘事作半偈曰山中專念佛足不到人間課佛之餘常勤思惟經義所明諸大菩薩以無所得故證入阿耨多羅三藐三菩提後閲大智度論方曉不捨者諸法中皆有助道力故不受者皆法實相畢竟空無所得故如是則莊嚴門內萬行無虧真如海中一毫不捨得無所得故履得一之旨豁爾消疑所以天得一以清地得一以寧人得一而道成若得一萬邪滅矣若得一萬事畢矣寬量底下凡夫窮陬晚學罔通元義素鄙空談回憶古人當言而懼發言而憂念之及此慚愧疊生故我末法鈍根惟崇一心念佛是以重實而不重虗貴行而不貴説涉有而不住有行空而不證空從小善而積殊功仗微因而成大果靜溯圓頂具戒之後理上未能相應之時遂閲楞嚴各家注釋復舍注釋而靜中觀照經文漸漸悟入波水動靜之源真妄虗實之理距知大哉楞嚴至哉妙用為南閻浮提清淨音聞教體不可得而思議者其惟是經歟普願後來行道之人始窮楞嚴而終歸於一心念佛信願相資決定得生淨土還須嚴淨毗尼莫貪兔角名聞龜毛利養是為最要安居既久玉泉重運土木移白沙泉護國寺而住入夏細閲永明宗鏡録唯心訣心賦萬善同歸等書至縱然未明道眼也須成就淨身量豁然擊節云此竟契末世行人因地即作偈曰三業皎潔淨身成諸善回向資淨因鈍根著相求菩提堅信願行獲往生嘗誦口中繇斯信願彌堅密密持名轉第一義諦於口輪喻如鐘之受杵愈擊愈鳴愈叩愈莫能掩如風行空不窒塞放去收來得自在君不見香象渡河步步截流獅子踞地頻頻返擲凡先後棲息養間之處每觸逆順愛憎之境必以此一句佛號為前鋒覆軍殺將亦不知其幾矣辛卯之夏幻質失調精神疲倦於夢寐間發現赤白蓮華光明曄曄倐然氣慡神清一心念佛密密不輟甲午之秋再移南山六通蘭若影不出山立願敬寫華嚴經功圓回向滋潤蓮根永固於是頓忘膚見既竭心思得淨土詩凡四十八篇廣搜博採各種經論於神會中默相孚契符合淨土者彚纂注解目之曰淨土救生船自謂舉六字而攝無邊教海立一理而收無盡真詮一一標宗重重引證普令眠雲立雪之人棲心淨土遂使究理探玄之者盡入圓宗故我普為羣靈敬述茲集仰憑佛眼證此微誠回向菩提乞求加被惟願法界衆生乘此救生船同出六道沉淪苦海同遊四土九品果海是知紫金臺上身登而本願非虗白玉毫中神化而一心自慶所願同見彌陀同悟無生同化含識同證妙覺自恧福德俱薄未可流通時有徐孝廉蓮臣先生謂量曰嘗聞藥無貴賤啓病者良法無精粗救時為要何故祕此不傳上人於法有慳心乎量默然無語徐孝廉慫慂付諸梨棗謂此四十八章詳細詮注遇明眼人自知一片真實苦心苟能枉者直之邪者正之疑者決之迷者悟之盡大地人於一念中同得念佛三昧共證菩提不亦偉歟光緒丙申歲仲春月丁丑日自序觀記湖濵墓廬假息屢辱枉顧開我心胸感佩無已舉天下醉生夢死顛倒沈溺於利欲之中儒教既絶佛法亦衰僕求學儒者而不可得求學佛者而得上人焉今觀上人所著淨土救生船洞徹佛性甚盛甚盛光緒二十二年九月二十六日富陽夏震武記題詞西來大義演詩篇豈是尋常文字緣淨域難求超度筏婆心為設救生船同遊阿耨多羅地自證虗靈不昧天愧我鈍根難索解老來猶是滯言詮丙申之冬十月既望曲園居士俞樾再題於南山右台仙館之歸真室時年七十有六
